version: '3.8'

services:
  # Evolution API - WhatsApp Integration
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: neuralilux-evolution
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      # Server
      - SERVER_URL=http://localhost:8080
      - SERVER_PORT=8080

      # Database
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true

      # Redis
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - REDIS_PREFIX_KEY=evolution

      # Authentication
      - AUTHENTICATION_API_KEY=23878528834238489asmdkfnq
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # Webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://backend:8000/api/v1/webhooks/evolution
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true

      # Logs
      - LOG_LEVEL=info
      - LOG_COLOR=true

      # QR Code
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#198754

      # Instance
      - DEL_INSTANCE=false

    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - neuralilux-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: neuralilux-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=neuralilux
      - POSTGRES_PASSWORD=neuralilux_password
      - POSTGRES_DB=neuralilux
      - POSTGRES_MULTIPLE_DATABASES=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      - neuralilux-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralilux"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: neuralilux-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    networks:
      - neuralilux-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database (for RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: neuralilux-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - neuralilux-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuralilux-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      - DATABASE_URL=postgresql://neuralilux:neuralilux_password@postgres:5432/neuralilux

      # Redis
      - REDIS_URL=redis://:redis_password@redis:6379/0

      # Evolution API
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=change-me-in-production

      # Qdrant
      - QDRANT_URL=http://qdrant:6333

      # RabbitMQ
      - RABBITMQ_URL=amqp://neuralilux:rabbitmq_password@rabbitmq:5672/neuralilux

      # JWT
      - SECRET_KEY=change-me-in-production-use-strong-secret
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30

      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Environment
      - ENVIRONMENT=development
      - DEBUG=true

    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    networks:
      - neuralilux-network
    depends_on:
      - postgres
      - redis
      - qdrant
      - evolution-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Message Queue Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuralilux-worker
    restart: unless-stopped
    environment:
      # Database
      - DATABASE_URL=postgresql://neuralilux:neuralilux_password@postgres:5432/neuralilux
      # Redis
      - REDIS_URL=redis://:redis_password@redis:6379/0
      # Evolution API
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=change-me-in-production
      # Qdrant
      - QDRANT_URL=http://qdrant:6333
      # RabbitMQ
      - RABBITMQ_URL=amqp://neuralilux:rabbitmq_password@rabbitmq:5672/neuralilux
      # Environment
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    networks:
      - neuralilux-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - evolution-api
    command: python scripts/run_worker.py

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuralilux-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - neuralilux-network
    depends_on:
      - backend
    command: npm run dev

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: neuralilux-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=neuralilux
      - RABBITMQ_DEFAULT_PASS=rabbitmq_password
      - RABBITMQ_DEFAULT_VHOST=neuralilux
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - neuralilux-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Nginx Reverse Proxy (Production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: neuralilux-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./config/nginx.conf:/etc/nginx/nginx.conf
  #     - ./config/ssl:/etc/nginx/ssl
  #   networks:
  #     - neuralilux-network
  #   depends_on:
  #     - backend
  #     - frontend

networks:
  neuralilux-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  evolution_instances:
  evolution_store:
  backend_uploads:
  rabbitmq_data:
