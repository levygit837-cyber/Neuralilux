services:
  # Evolution API - WhatsApp Integration
  evolution-api:
    image: atendai/evolution-api:2.3.7
    container_name: neuralilux-evolution
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      # Server
      - SERVER_TYPE=http
      - SERVER_URL=http://localhost:8081
      - SERVER_PORT=8080

      # Database
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:Ev0lution_S3cur3_P@ssw0rd!@postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true

      # Redis (Cache)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:redis_password@redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false

      # Authentication
      - AUTHENTICATION_API_KEY=3v0lut10n_4P1_K3y_S3cur3_2026!
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=false

      # Webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:8000/api/v1/webhooks/evolution
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBSOCKET_ENABLED=true
      - WEBSOCKET_GLOBAL_EVENTS=true
      - WEBSOCKET_ALLOWED_HOSTS=*

      # Logs
      - LOG_LEVEL=ERROR,WARN,INFO
      - LOG_COLOR=false
      - LOG_BAILEYS=error

      # QR Code
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#198754

      # Instance
      - DEL_INSTANCE=false

      # Telemetry
      - TELEMETRY=false

      # Language
      - LANGUAGE=pt

    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - neuralilux-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: neuralilux-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=neuralilux
      - POSTGRES_PASSWORD=neuralilux_password
      - POSTGRES_DB=neuralilux
      - POSTGRES_MULTIPLE_DATABASES=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      - neuralilux-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralilux"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: neuralilux-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    networks:
      - neuralilux-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  # Backend API (FastAPI) - REMOVED: Run locally on host
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: neuralilux-backend
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     # Database
  #     - DATABASE_URL=postgresql://neuralilux:neuralilux_password@postgres:5432/neuralilux

  #     # Redis
  #     - REDIS_URL=redis://:redis_password@redis:6379/0

  #     # Evolution API
  #     - EVOLUTION_API_URL=http://evolution-api:8080
  #     - EVOLUTION_API_KEY=3v0lut10n_4P1_K3y_S3cur3_2026!
  #     - EVOLUTION_WEBSOCKET_ENABLED=true

  #     # RabbitMQ
  #     - RABBITMQ_URL=amqp://neuralilux:rabbitmq_password@rabbitmq:5672/neuralilux

  #     # JWT
  #     - SECRET_KEY=change-me-in-production-use-strong-secret
  #     - ALGORITHM=HS256
  #     - ACCESS_TOKEN_EXPIRE_MINUTES=30

  #     # OpenAI
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}

  #     # Anthropic
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

  #     # LM Studio (host machine)
  #     - LM_STUDIO_URL=${LM_STUDIO_URL:-http://172.17.0.1:1234}
  #     - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-nvidia/nemotron-3-nano-4b}
  #     - LM_STUDIO_DISABLE_THINKING=${LM_STUDIO_DISABLE_THINKING:-true}
  #     - AGENT_RESPONSE_MAX_TOKENS=${AGENT_RESPONSE_MAX_TOKENS:-250}

  #     # Environment
  #     - ENVIRONMENT=development
  #     - DEBUG=true

  #   volumes:
  #     - ./backend:/app
  #     - ./output:/app/output:ro
  #     - backend_uploads:/app/uploads
  #   networks:
  #     - neuralilux-network
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   depends_on:
  #     - postgres
  #     - redis
  #     - evolution-api
  #   command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --reload
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuralilux-worker
    restart: unless-stopped
    environment:
      # Database
      - DATABASE_URL=postgresql://neuralilux:neuralilux_password@postgres:5432/neuralilux
      # Redis
      - REDIS_URL=redis://:redis_password@redis:6379/0
      # Evolution API
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=3v0lut10n_4P1_K3y_S3cur3_2026!
      # RabbitMQ
      - RABBITMQ_URL=amqp://neuralilux:rabbitmq_password@rabbitmq:5672/neuralilux
      # LM Studio (host machine)
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1235}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3.5-4b:claude-4.5-opus-distilled-v2}
      - LM_STUDIO_DISABLE_THINKING=${LM_STUDIO_DISABLE_THINKING:-true}
      - AGENT_RESPONSE_MAX_TOKENS=${AGENT_RESPONSE_MAX_TOKENS:-250}
      # Environment
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      - ./backend:/app
      - ./output:/app/output:ro
      - backend_uploads:/app/uploads
    networks:
      - neuralilux-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - evolution-api
      - lmstudio-proxy
    command: python scripts/run_worker.py

  lmstudio-proxy:
    image: alpine/socat
    container_name: neuralilux-lmstudio-proxy
    restart: unless-stopped
    network_mode: host
    command:
      - TCP-LISTEN:1235,bind=0.0.0.0,reuseaddr,fork
      - TCP:127.0.0.1:1234

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuralilux-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - neuralilux-network
    command: npm run dev

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: neuralilux-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=neuralilux
      - RABBITMQ_DEFAULT_PASS=rabbitmq_password
      - RABBITMQ_DEFAULT_VHOST=neuralilux
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - neuralilux-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  neuralilux-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  evolution_store:
  backend_uploads:
  rabbitmq_data:
  lmstudio_data:
